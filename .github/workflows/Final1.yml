name: mainelopment workflow

on:
  push:
    branches:
      - main

env:
  PROJECT_NAME: 04062025
  PROJECT_FOLDER: Shared
  ORCH_URL: https://cloud.uipath.com/testbfsvyha/DefaultTenant
  ORCH_TENANT: DefaultTenant
  ORCH_ACC_NAME: testbfsvyha

jobs:
  print-details:
    runs-on: ubuntu-latest
    steps:
      - name: Echo default environment variables
        run: |
          echo "Home: ${HOME}"
          echo "GITHUB_WORKFLOW: ${GITHUB_WORKFLOW}"
          echo "GITHUB_ACTIONS: ${GITHUB_ACTIONS}"
          echo "GITHUB_ACTOR: ${GITHUB_ACTOR}"
          echo "GITHUB_REPOSITORY: ${GITHUB_REPOSITORY}"
          echo "GITHUB_EVENT_NAME: ${GITHUB_EVENT_NAME}"
          echo "GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}"
          echo "GITHUB_SHA: ${GITHUB_SHA}"
          echo "GITHUB_REF: ${GITHUB_REF}"

  cleaner:
    runs-on: ubuntu-latest
    steps:
      - name: Clean previous workspace
        run: |
          echo "Cleaning up previous run"
          rm -rf "${{ github.workspace }}"

  get-uipath-token:
    runs-on: windows-latest
    outputs:
      userkey: ${{ steps.gettoken.outputs.token }}
    steps:
      - name: Get UiPath Access Token
        id: gettoken
        shell: pwsh
        run: |
          $clientId = "21a6955b-2fbe-4cd4-8d71-4124dff739ce"
          $clientSecret = "MvNiHINKUYaG6eAV"
          $scope = "OR.Jobs"
          
          # Create form-urlencoded body string
          $body = "grant_type=client_credentials&client_id=$clientId&client_secret=$clientSecret&scope=$scope"
          
          # Request token
          $response = Invoke-RestMethod -Uri "https://cloud.uipath.com/identity_/connect/token" `
            -Method Post `
            -Body $body `
            -ContentType "application/x-www-form-urlencoded"
          
          # Write token to output
          Write-Output "Access token: $($response.access_token)"
          # Set output for workflow
          Write-Output "::set-output name=token::$($response.access_token)"

  build-uipath-nuget-package:
    needs: [cleaner, get-uipath-token]
    runs-on: windows-latest
    env:
      ORCH_USER_KEY: ${{ needs.get-uipath-token.outputs.userkey }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Build NuGet Package
        shell: pwsh
        run: |
          pwsh "${{ github.workspace }}/scripts/UiPathPack.ps1" `
            "${{ github.workspace }}/project.json" `
            -destination_folder "${{ github.workspace }}/package"

      - name: Upload UiPath Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: |
            package/*
            scripts/*.ps1

  publish-uipath-nuget-package:
    needs: build-uipath-nuget-package
    runs-on: windows-latest
    env:
      ORCH_USER_KEY: ${{ needs.get-uipath-token.outputs.userkey }}
      ORCH_URL: ${{ env.ORCH_URL }}
      ORCH_TENANT: ${{ env.ORCH_TENANT }}
      ORCH_ACC_NAME: ${{ env.ORCH_ACC_NAME }}
      PROJECT_FOLDER: ${{ env.PROJECT_FOLDER }}
    steps: 
      - name: Download UiPath Artifacts
        uses: actions/download-artifact@v4
        with:
          name: Artifacts
      - name: Publish Nuget Package to main
        shell: pwsh
        run: |
          $packagePath = "${{ github.workspace }}\package"
          $orchUrl = "${{ env.ORCH_URL }}"
          $tenant = "${{ env.ORCH_TENANT }}"
          $userKey = "${{ env.ORCH_USER_KEY }}"
          $accountName = "${{ env.ORCH_ACC_NAME }}"
          $folderOrgUnit = "${{ env.PROJECT_FOLDER }}"
          & "${{ github.workspace }}\scripts\UiPathDeploy.ps1" $packagePath $orchUrl $tenant -UserKey $userKey -account_name $accountName -folder_organization_unit $folderOrgUnit

  test-uipath-published-package:
    needs: publish-uipath-nuget-package
    runs-on: windows-latest
    env:
      ORCH_USER_KEY: ${{ needs.get-uipath-token.outputs.userkey }}
      ORCH_URL: ${{ env.ORCH_URL }}
      ORCH_TENANT: ${{ env.ORCH_TENANT }}
      ORCH_ACC_NAME: ${{ env.ORCH_ACC_NAME }}
    steps:
      - name: Download UiPath Artifacts
        uses: actions/download-artifact@v4
        with:
          name: Artifacts
      - name: Test the Package With Test Cases 
        shell: pwsh
        run: |
          $orchUrl = "${{ env.ORCH_URL }}"
          $tenant = "${{ env.ORCH_TENANT }}"
          $userKey = "${{ env.ORCH_USER_KEY }}"
          $accountName = "${{ env.ORCH_ACC_NAME }}"
          & "${{ github.workspace }}\scripts\UiPathRunTest.ps1" $orchUrl $tenant -UserKey $userKey -account_name $accountName -testset "04062025TestSet"
